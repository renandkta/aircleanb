<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>AirCleanB – We’ll be back soon</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(160deg, #008cba 0%, #005f7a 100%);
        color: #fff;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 32rem;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 1rem;
        padding: 2rem;
        backdrop-filter: blur(8px);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
      }
      p {
        margin: 0;
        line-height: 1.6;
        opacity: 0.95;
        font-size: 1rem;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="brand">AirCleanB</p>
      <h1>We’re updating our site</h1>
      <p>
        We’re temporarily offline for maintenance. Thank you for your patience — we’ll be back shortly.
      </p>
    </div>
  </body>
</html>
