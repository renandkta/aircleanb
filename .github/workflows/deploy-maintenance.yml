# Publishes a static maintenance page to GitHub Pages (replaces live site until you redeploy the app).
# Trigger manually: Actions → "Deploy maintenance page to GitHub Pages" → Run workflow.
# Does NOT modify branch main or the React app — only uploads maintenance-static/.

name: Deploy maintenance page to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-maintenance:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload maintenance artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./maintenance-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
